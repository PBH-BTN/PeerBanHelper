name: Release

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  Build_Executable:
    name: Build JAR Files
    permissions:
      contents: write
      checks: write
      actions: read
      issues: read
      packages: write
      pull-requests: read
      repository-projects: read
      statuses: read
    secrets: inherit
    uses: ./.github/workflows/build_gradle.yml

  Build_Installers:
    name: Generate Installers
    needs: Build_Executable
    uses: ./.github/workflows/build_installers.yml
    secrets: inherit

  Build_SPK:
    name: Generate Synology Package
    needs: Build_Executable
    uses: ./.github/workflows/build_spk.yml
    with:
      image: registry.cn-hangzhou.aliyuncs.com/ghostchu/peerbanhelper:${{ github.ref_name }}

  Build_DEB:
    name: Generate Debian Package
    needs: Build_Executable
    uses: ./.github/workflows/build_deb.yml

  Build_PKG:
    name: Generate FreeBSD Package
    needs: Build_Executable
    uses: ./.github/workflows/build_pkg.yml

  Build_Portable:
    name: Generate Portable Version
    needs: Build_Installers
    uses: ./.github/workflows/build_portable.yml

  Empty_Old_S3_Files:
    name: Delete Outdate file in S3
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    needs: [Build_Executable, Build_Installers, Build_SPK, Build_DEB, Build_PKG, Build_Portable]
    uses: ./.github/workflows/delete_old_s3_objects.yml
    secrets: inherit

  Upload_Updates_To_S3:
    name: Update To S3
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    needs: [ Build_Executable, Build_Installers, Build_SPK, Build_DEB, Build_PKG, Build_Portable, Empty_Old_S3_Files ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: installer-dist
          path: build/media
      - uses: shallwefootball/s3-upload-action@master
        with:
          aws_key_id: ${{ secrets.S3_ACCESS_KEY }}
          aws_secret_access_key: ${{ secrets.S3_SECRET_KEY }}
          aws_bucket: ${{ secrets.S3_BUCKET }}
          endpoint: ${{ secrets.S3_ENDPOINT }}
          source_dir: 'build/media'
          destination_dir: 'updates/latest'

  Clear_CloudFlare_Updates:
    name: Clear CloudFlare Cache
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    needs: [Upload_Updates_To_S3]
    uses: ./.github/workflows/flush_cloudflare_cache.yml
    secrets: inherit

  Upload_SPK_To_Repo:
    name: Upload SPK to SPKRepo
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    needs: Build_SPK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: java_info
        uses: YunaBraska/java-info-action@main
      - uses: actions/download-artifact@v7
        with:
          name: spk-dist
          path: build/media
      - name: Upload SPK to SPKRepo
        run: |
          SPK_FILES=$(find build/media -name "peerbanhelper-*.spk" ! -name "*_debug.spk")
          if [ -z "$SPK_FILES" ]; then
            echo "Error: No SPK files found"
            exit 1
          fi
          echo "Found SPK files to upload:"
          echo "$SPK_FILES"
          while IFS= read -r SPK_FILE; do
            echo "Uploading: ${SPK_FILE}"
            curl --location --request POST "https://spk-repo.pbh-btn.com/api/packages" \
              --header "Content-Type: application/octet-stream" \
              --header "Authorization: Basic ${{ secrets.SPKREPO_BASIC_AUTH }}" \
              --header "Accept: */*" \
              --header "Connection: keep-alive" \
              --data-binary "@${SPK_FILE}"
            echo "Upload completed for: ${SPK_FILE}"
          done <<< "$SPK_FILES"

  Upload_Artifacts:
    name: Upload Release Artifacts
    continue-on-error: true
    if: github.event_name != 'workflow_dispatch'
    needs: [Build_Executable, Build_Installers, Build_SPK, Build_DEB, Build_PKG, Build_Portable]
    permissions:
      contents: write
      checks: write
      actions: read
      issues: read
      packages: write
      pull-requests: read
      repository-projects: read
      statuses: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: gradle-dist
          path: build/
      - uses: actions/download-artifact@v7
        with:
          name: installer-dist
          path: build/media
      - uses: actions/download-artifact@v7
        with:
          name: spk-dist
          path: build/media
      - uses: actions/download-artifact@v7
        with:
          name: deb-dist
          path: build/media
      - uses: actions/download-artifact@v7
        with:
          name: portable-dist
          path: build/media
      - uses: actions/download-artifact@v7
        with:
          name: freebsd-pkg-13.4-dist
          path: build/media
      - uses: actions/download-artifact@v7
        with:
          name: freebsd-pkg-14.1-dist
          path: build/media
      - name: Zip medias for create torrent
        run: tar -zcvf PeerBanHelper_Installers.tar.gz build/media/
      - name: Install mktorrent
        run: sudo apt-get install -y mktorrent
      - name: Determine version
        id: set_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(git rev-parse --short "${{ github.sha }}")
            echo "version=sha-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi
      - name: Create copy of Installers archive
        run: cp PeerBanHelper_Installers.tar.gz "PeerBanHelper_Installers_${{ steps.set_version.outputs.version }}.tar.gz"
      - name: Make torrent
        run: |
          mktorrent -t 8 \
          -a udp://tracker.opentrackr.org:1337/announce \
          -a udp://tracker.publicbt.com:80/announce \
          -a udp://tracker.openbittorrent.com:80/announce \
          -a https://sparkle.ghostchu-services.top/announce \
          -a udp://opentracker.io:6969/announce \
          -a wss://tracker.openwebtorrent.com:443/announce \
          -c "PeerBanHelper/${{ github.ref }} (${{ github.sha }}) on ${{ github.repository }}. Published by ${{ github.repository_owner }}." \
          -w "https://github.com/${{ github.repository }}/releases/download/${{ steps.set_version.outputs.version }}/PeerBanHelper_Installers.tar.gz" \
          -o peerbanhelper.torrent \
          "PeerBanHelper_Installers_${{ steps.set_version.outputs.version }}.tar.gz"
      - uses: actions/upload-artifact@v6
        with:
          name: torrent-dist
          path: |
            peerbanhelper.torrent
            PeerBanHelper_Installers.tar.gz
        id: project
      - uses: alexellis/upload-assets@0.4.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          asset_paths: '["build/media/PeerBanHelper_*", "build/media/peerbanhelper_*", "build/media/peerbanhelper-*", "build/media/_____UNSUPPORTED_PeerBanHelper_*", "peerbanhelper.torrent", "PeerBanHelper_Installers.tar.gz"]'

  Publish_Changelog:
    name: Publish Changelog to Forum
    continue-on-error: true
    if: github.event_name == 'release'
    needs: Upload_Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check if release body is empty
        id: check_body
        run: |
          BODY="${{ github.event.release.body }}"
          if [[ -z "$(echo "$BODY" | tr -d '[:space:]')" ]]; then
            echo "Release body is empty, skipping changelog publication"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Release body found, will publish changelog"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Ensure jq is installed
        if: steps.check_body.outputs.skip != 'true'
        run: which jq || (sudo apt-get update && sudo apt-get install -y jq)
      - name: Prepare and send changelog to forum
        if: steps.check_body.outputs.skip != 'true'
        run: |
          # Escape title and body for JSON using jq
          TITLE=$(echo '${{ github.event.release.name }}' | jq -Rs .)
          BODY=$(echo '${{ github.event.release.body }}' | jq -Rs .)
          
          # Build JSON payload
          JSON_PAYLOAD=$(cat <<EOF
          {
            "data": {
              "type": "discussions",
              "attributes": {
                "title": $TITLE,
                "content": $BODY
              },
              "relationships": {
                "tags": {
                  "data": [
                    {
                      "type": "tags",
                      "id": "5"
                    },
                    {
                      "type": "tags",
                      "id": "25"
                    }
                  ]
                }
              }
            }
          }
          EOF
          )
          
          echo "Sending changelog to forum API..."
          echo "JSON Payload:"
          echo "$JSON_PAYLOAD" | jq .
          
          # Send POST request with retry
          RESPONSE=$(curl --retry 3 --retry-delay 2 --retry-connrefused \
            -i -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Token ${{ secrets.FLARUM_BBS_API_KEY }}" \
            -d "$JSON_PAYLOAD" \
            https://bbs.pbh-btn.com/api/discussions)
          
          echo "API Response:"
          echo "$RESPONSE"
          
          # Extract and check HTTP status code
          HTTP_CODE=$(echo "$RESPONSE" | grep -i "^HTTP" | tail -1 | awk '{print $2}')
          echo "HTTP Status Code: $HTTP_CODE"
          
          if [[ "$HTTP_CODE" =~ ^2[0-9]{2}$ ]]; then
            echo "✓ Changelog published successfully"
          else
            echo "⚠ API returned non-2xx status code: $HTTP_CODE"
            echo "This is a warning only, workflow will continue"
          fi

  Build_Docker:
    name: Build Docker Image
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: write
      checks: write
      actions: read
      issues: read
      packages: write
      pull-requests: read
      repository-projects: read
      statuses: read
    needs: Build_Executable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: gradle-dist
          path: build
      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ghostchu/peerbanhelper
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,latest-jvm-universal
            type=raw,latest
            type=sha
      - name: Build and push Docker image
        uses: docker/build-push-action@v6.19.2
        if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: |
            linux/amd64
            linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}-jvm-universal
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_HASH=${{ github.sha }}
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: "registry.cn-hangzhou.aliyuncs.com"
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}
      - name: Extract metadata (tags, labels) for Aliyun ACR
        id: meta-acr
        uses: docker/metadata-action@v5.10.0
        with:
          images: registry.cn-hangzhou.aliyuncs.com/ghostchu/peerbanhelper
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,latest-jvm-universal
            type=raw,latest
            type=sha
      - name: Build and push Aliyun ACR
        if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: ./Dockerfile-Release
          push: true
          platforms: |
            linux/amd64
            linux/arm64/v8
          tags: ${{ steps.meta-acr.outputs.tags }}
          labels: ${{ steps.meta-acr.outputs.labels }}-jvm-universal
          cache-from: type=gha
          cache-to: type=gha,mode=min