name: Installer Build

on:
  workflow_call:
    secrets:
      INSTALL4J_LICENSE:
        required: true
jobs:
  install4jc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: java_info
        uses: YunaBraska/java-info-action@main
      - uses: actions/download-artifact@v8
        with:
          name: gradle-dist
          path: build/
      - uses: luangong/setup-install4j@v1
        name: Setup Install4j
        with:
          version: 13.0.1
          license: ${{ secrets.INSTALL4J_LICENSE }}
      - name: Restore install4j cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/install4j/v13
          key: install4j-13-${{ hashFiles('**/*.install4j') }}
          restore-keys: |
            install4j-13-${{ hashFiles('**/*.install4j') }}
      - name: Make installers
        run: |
          /opt/install4j/bin/install4jc -L ${{ secrets.INSTALL4J_LICENSE }} -r ${{ steps.java_info.outputs.x_version }} -d build/media -D librariesPath=$(pwd)/build/libraries install4j/project.install4j
      - name: Delete garbages
        run: |
          rm -rf build/media/debug*
      # jarPath=$(pwd) 是必须的，install4jc 不知道什么毛病，不支持相对路径，这太诡异了
      - name: Copy JBR Bundles
        id: jbr_bundles
        run: |
          dir="${1:-$HOME/.cache/install4j/v13/cached_jres/generated}"
          find "$dir" -type f -name 'windows-amd64-*.tar.gz' -printf '%T@ %p\n' \
            | sort -nr | cut -d' ' -f2- \
            | while IFS= read -r f; do
                if tar -xOzf "$f" lib/classlist 2>/dev/null | grep -q 'com/jetbrains/exported/JBRApi'; then
                  echo "jbr_path=$(realpath "$f")" >> $GITHUB_OUTPUT
                  break
                fi
              done
      - name: Upload JBR Bundles
        uses: actions/upload-artifact@v7
        with:
          name: jbr-dist
          if-no-files-found: error
          path: ${{ steps.jbr_bundles.outputs.jbr_path }}
      - name: Upload build artifacts linux aarch64
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: build/media/PeerBanHelper_linux-aarch64*
      - name: Upload build artifacts linux amd64
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: build/media/PeerBanHelper_linux-amd64*
      - name: Upload build artifacts macos aarch64
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: build/media/PeerBanHelper_macos_macos-aarch64*
      - name: Upload build artifacts macos amd64
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: build/media/PeerBanHelper_macos_macos-amd64*
      - name: Upload build artifacts macos nojava
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: build/media/PeerBanHelper_macos_nojava*
      - name: Upload build artifacts rpm
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: build/media/PeerBanHelper_rpm*
      - name: Upload build artifacts windows arm64
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: |
            build/media/PeerBanHelper_windows-arm64*
            !build/media/*nojava.exe
      - name: Upload build artifacts windows arm64 nojava
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: build/media/PeerBanHelper_windows-arm64*nojava.exe
      - name: Upload build artifacts windows x64
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: |
            build/media/PeerBanHelper_windows-x64*
            !build/media/PeerBanHelper_windows-x64_win7*
            !build/media/*nojava.exe
      - name: Upload build artifacts windows x64 nojava
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: build/media/PeerBanHelper_windows-x64*nojava.exe
      - name: Upload build artifacts windows x64 win7
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          path: build/media/PeerBanHelper_windows-x64_win7*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installer-dist
          if-no-files-found: error
          path: |
            build/media/md5sums
            build/media/sha256sums
            build/media/output.txt
            build/media/updates.xml
