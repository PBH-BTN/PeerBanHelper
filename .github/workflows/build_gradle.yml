name: Gradle Build

on:
  workflow_call:
    secrets:
      INSTALL4J_LICENSE:
        required: true
jobs:
  WebUI:
    uses: ./.github/workflows/build_fe.yml
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: 'gradle'
          cache-dependency-path: |
            gradle/wrapper/gradle-wrapper.properties
            build.gradle.kts
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run tests
        run: ./gradlew test
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            build/reports/tests/
            build/test-results/
  Gradle:
    needs: [WebUI]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        name: Download WebUI Files
        with:
          name: webui-dist
          path: src/main/resources/static
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: 'gradle'
          cache-dependency-path: |
            gradle/wrapper/gradle-wrapper.properties
            build.gradle.kts
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build with Gradle
        run: ./gradlew clean build -x test
        env:
          JAVA_SENTRY_DSN: ${{ secrets.JAVA_SENTRY_DSN }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gradle-dist
          if-no-files-found: error
          path: |
            build/libraries
            build/libs/*.jar
  Test_Database_Local:
    needs: [ Gradle ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        type: [sqlite, h2]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: gradle-dist
          path: build/
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
      - name: Install depends
        run: |
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y python3-flask 2>&1
      - name: Run test
        run: |
          chmod +x test/test-db.sh
          test/test-db.sh
        env:
          DATEBASE_TYPE: ${{ matrix.type }}
  Test_Database_Server:
    needs: [ Gradle ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: mysql:5.7
            type: mysql
            port: 3306
            wait: mysqladmin ping
          - db: mysql:8.4
            type: mysql
            port: 3306
            wait: mysqladmin ping
          - db: mariadb:10.6
            type: mysql
            port: 3306
            wait: mariadb-admin ping
          - db: mariadb:11
            type: mysql
            port: 3306
            wait: mariadb-admin ping
          - db: postgres:14
            type: postgresql
            port: 5432
            wait: pg_isready
          - db: postgres:16
            type: postgresql
            port: 5432
            wait: pg_isready
    services:
      db:
        image: ${{ matrix.db }}
        env:
          MYSQL_USER: test
          MYSQL_PASSWORD: test
          MYSQL_DATABASE: test
          MYSQL_ROOT_PASSWORD: test
          MARIADB_USER: test
          MARIADB_PASSWORD: test
          MARIADB_DATABASE: test
          MARIADB_ROOT_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd "${{ matrix.wait }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - ${{ matrix.port }}:3306
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: gradle-dist
          path: build/
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
      - name: Install depends
        run: |
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y python3-flask 2>&1
      - name: Run test
        run: |
          chmod +x test/test-db.sh
          test/test-db.sh
        env:
          DATEBASE_TYPE: ${{ matrix.type }}
