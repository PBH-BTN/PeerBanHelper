LAB_EXPERIMENT_WIN32_EMPTY_WORKING_SET_TITLE: "Win32 Platform: Empty Working Set"
LAB_EXPERIMENT_WIN32_EMPTY_WORKING_SET_DESCRIPTION: |
  On the Windows platform, PeerBanHelper will call the Win32 API to empty its process working set during Full GC (or at regular intervals) to release memory.  
  Inactive memory pages will be moved to the operating system's paging file, which may cause temporary performance degradation and disk I/O, but helps free up physical memory used by the process for other applications.  
  Changing this setting requires restarting PeerBanHelper to take effect.
BTN_HEARTBEAT_TITLE: "Heartbeat Update"
BTN_HEARTBEAT_DESCRIPTION: |
  This feature allows the BTN network to request PeerBanHelper to send heartbeat requests to the BTN server at regular intervals to update its status on the BTN network.
  Sometimes this feature is also used to detect your available IP address in order to update records on the BTN network. This depends on the server's requirements.
  
