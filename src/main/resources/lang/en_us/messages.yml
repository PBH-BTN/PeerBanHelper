BTN_ABILITY_SUBMIT_SWARM: "Submit Swarm Tracking Data"
BTN_ABILITY_SUBMIT_SWARM_DESCRIPTION: |
  "Submit Swarm Tracking Data" is the successor to "Submit History Records" and "Submit Snapshot Data". The new "Submit Swarm Tracking Data" tracks, stores, and submits Peers data in a more server-friendly format to reduce the data aggregation and analysis burden on BTN servers.
  This capability allows BTN servers to periodically receive Peers activity and the latest recorded activity snapshot data from downloaders tracked by PeerBanHelper. This data helps BTN servers analyze malicious behavior on the network and dynamically generate anti-leeching rules to block such activities. Additionally, the data aids in identifying potential exploits that bypass PeerBanHelper's anti-leeching mechanisms by leveraging vulnerabilities in its functionality.
