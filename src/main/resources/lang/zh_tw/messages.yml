BTN_ABILITY_SUBMIT_SWARM: "提交種群跟蹤資料"
BTN_ABILITY_SUBMIT_SWARM_DESCRIPTION: |
  「提交種群跟蹤資料」是「提交歷史記錄」和「提交快照資料」的繼任者。新的「提交種群跟蹤資料」以一種更加伺服器友好的格式追蹤、儲存和提交 Peers 資料，以減輕 BTN 伺服器的資料聚合分析壓力。
  該能力允許 BTN 伺服器定期接收 PeerBanHelper 所跟蹤的下載器上的 Peers 活動和最後一次記錄的活動資料快照。這些資料有助於 BTN 伺服器分析網路上的惡意行為，並動態生成反吸血規則阻斷這些惡意行為。同時，這些資料還有助於分析是否存在利用 PeerBanHelper 反吸血功能的漏洞，繞過反吸血機制的在野利用。
