CRASH_MANAGER_CRASH_RECOVERY_ALERT_DESCRIPTION: |
  PeerBanHelper 在上次執行中遇到了致命錯誤並崩潰，但已成功從崩潰中自動復原。  
  該問題通常是由於 Java Virtual Machine 內部錯誤所導致的，如果此錯誤頻繁發生，請向開發者報告並附帶下面的技術資訊：
  
  **崩潰 PID:** {}  
  **復原重新啟動時間:** {}  
  **JVM 崩潰日誌轉儲檔案位置:** {}  
  *在回饋問題時，請一同上傳崩潰日誌轉儲文件。*
  
  對此帶來的不便，我們深表歉意。
BOOT_TIME: "PeerBanHelper 啟動完成，用時 {}ms"
JBR_REQUIRED_TITLE: "Java 執行時環境不相容"
JBR_REQUIRED_DESCRIPTION: |
  PeerBanHelper 在 Windows 平台下需要 JetBrains Runtime (JBR) 才能正常執行。  
  
  您目前正在使用為：{} {}
  
  對於 Eclipse Adoptium, Azul Zulu, BellSoft Liberica, Oracle/Open JDK 等其它 Java 執行時環境可能不包含 PeerBanHelper 所需要的問題的修復補丁。  
  如果出現與 awt.dll 相關的崩潰問題請切換到 JetBrains Runtime 或者**使用帶有 Java 環境的 PeerBanHelper 安裝程式覆蓋安裝**。  
  此提醒僅顯示一次。
  
  [下載 JetBrains Runtime](https://github.com/JetBrains/JetBrainsRuntime/releases)
LAB_EXPERIMENT_WIN32_EMPTY_WORKING_SET_TITLE: "Win32 平台：清空工作集"
LAB_EXPERIMENT_WIN32_EMPTY_WORKING_SET_DESCRIPTION: |
  在 Windows 平台上，PeerBanHelper 將在 Full GC（或者每隔一段時間）呼叫 Win32 API 清空自身進程工作集以釋放記憶體。  
  不活躍的記憶體分頁將被轉移到作業系統分頁檔案中，可能引起短暫效能下降和磁碟 I/O，但有助於釋放進程佔用的實體記憶體以供其他應用程式使用。  
  變更此設定需要重新啟動 PeerBanHelper 以使其生效。
BTN_HEARTBEAT_TITLE: "心跳更新"
BTN_HEARTBEAT_DESCRIPTION: |
  該能力允許 BTN 網路請求 PeerBanHelper 每隔一定時間向 BTN 伺服器發送一個心跳請求，以更新在 BTN 網路上的狀態。
  有時該功能還被用來檢測您的可用 IP 位址，以便更新在 BTN 網路上的記錄。這取決於伺服器的要求。
  
  目前狀態：
  {}
